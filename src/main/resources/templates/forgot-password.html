<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 英语学习系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .forgot-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card forgot-card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-key text-primary" style="font-size: 3rem;"></i>
                        <h3 class="mt-3 fw-bold">忘记密码</h3>
                        <p class="text-muted">输入注册邮箱重置密码</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <div th:if="${success}" class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-envelope me-1"></i>注册邮箱
                            </label>
                            <input type="email" class="form-control" name="email" 
                                   placeholder="请输入注册邮箱" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>新密码
                            </label>
                            <input type="password" class="form-control" name="newPassword" 
                                   placeholder="请输入新密码（6-20字符）" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>确认新密码
                            </label>
                            <input type="password" class="form-control" name="confirmPassword" 
                                   placeholder="请再次输入新密码" required>
                        </div>

                        <button type="submit" class="btn btn-submit btn-primary w-100 text-white mb-3">
                            <i class="bi bi-check-circle me-2"></i>重置密码
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="/login" class="text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>返回登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
