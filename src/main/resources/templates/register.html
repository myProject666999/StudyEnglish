<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 英语学习系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
        }
        .register-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        .form-control.is-valid {
            border-color: #198754;
        }
        .form-control.is-invalid {
            border-color: #dc3545;
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .valid-feedback, .invalid-feedback {
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card register-card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                        <h3 class="mt-3 fw-bold">注册账户</h3>
                        <p class="text-muted">创建您的英语学习账户</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/register}" method="post" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-person me-1"></i>用户名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" name="username" id="username" 
                                   placeholder="请输入用户名（4-20字符）" required>
                            <div class="invalid-feedback" id="usernameFeedback"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" name="password" id="password" 
                                   placeholder="请输入密码（6-20字符）" required>
                            <div class="invalid-feedback">请输入密码</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>确认密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" 
                                   placeholder="请再次输入密码" required>
                            <div class="invalid-feedback" id="confirmPasswordFeedback"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-person me-1"></i>昵称
                            </label>
                            <input type="text" class="form-control" name="nickname" 
                                   placeholder="请输入昵称（可选）">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-envelope me-1"></i>邮箱
                            </label>
                            <input type="email" class="form-control" name="email" id="email" 
                                   placeholder="请输入邮箱（找回密码需要）">
                            <div class="invalid-feedback" id="emailFeedback"></div>
                        </div>

                        <button type="submit" class="btn btn-register btn-primary w-100 text-white mb-3">
                            <i class="bi bi-person-plus me-2"></i>注册
                        </button>
                    </form>

                    <div class="text-center">
                        <span class="text-muted">已有账户？</span>
                        <a href="/login" class="text-decoration-none fw-medium">立即登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('username').addEventListener('blur', function() {
            var username = this.value;
            var feedback = document.getElementById('usernameFeedback');
            
            if (username.length < 4 || username.length > 20) {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
                feedback.textContent = '用户名长度需在4-20字符之间';
                feedback.style.display = 'block';
                return;
            }
            
            fetch('/check-username?username=' + encodeURIComponent(username))
                .then(response => response.json())
                .then(exists => {
                    if (exists) {
                        this.classList.add('is-invalid');
                        this.classList.remove('is-valid');
                        feedback.textContent = '用户名已存在';
                        feedback.style.display = 'block';
                    } else {
                        this.classList.add('is-valid');
                        this.classList.remove('is-invalid');
                        feedback.style.display = 'none';
                    }
                });
        });

        document.getElementById('email').addEventListener('blur', function() {
            var email = this.value;
            var feedback = document.getElementById('emailFeedback');
            
            if (!email) {
                this.classList.remove('is-invalid', 'is-valid');
                feedback.style.display = 'none';
                return;
            }
            
            var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
                feedback.textContent = '请输入有效的邮箱地址';
                feedback.style.display = 'block';
                return;
            }
            
            fetch('/check-email?email=' + encodeURIComponent(email))
                .then(response => response.json())
                .then(exists => {
                    if (exists) {
                        this.classList.add('is-invalid');
                        this.classList.remove('is-valid');
                        feedback.textContent = '该邮箱已被注册';
                        feedback.style.display = 'block';
                    } else {
                        this.classList.add('is-valid');
                        this.classList.remove('is-invalid');
                        feedback.style.display = 'none';
                    }
                });
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            var password = document.getElementById('password').value;
            var confirmPassword = this.value;
            var feedback = document.getElementById('confirmPasswordFeedback');
            
            if (confirmPassword && password !== confirmPassword) {
                this.classList.add('is-invalid');
                this.classList.remove('is-valid');
                feedback.textContent = '两次密码输入不一致';
                feedback.style.display = 'block';
            } else {
                this.classList.add('is-valid');
                this.classList.remove('is-invalid');
                feedback.style.display = 'none';
            }
        });
    </script>
</body>
</html>
