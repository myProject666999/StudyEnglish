<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 英语学习系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #2c3e50;
            box-shadow: 0 0 0 0.25rem rgba(44, 62, 80, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(44, 62, 80, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="card login-card p-5">
                    <div class="text-center mb-4">
                        <div class="bg-secondary rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                            <i class="bi bi-gear text-white" style="font-size: 2.5rem;"></i>
                        </div>
                        <h3 class="mt-3 fw-bold">管理员登录</h3>
                        <p class="text-muted">英语学习系统后台管理</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/admin/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium">
                                <i class="bi bi-person me-1"></i>管理员账号
                            </label>
                            <input type="text" class="form-control" name="username" 
                                   placeholder="请输入管理员账号" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">
                                <i class="bi bi-lock me-1"></i>密码
                            </label>
                            <input type="password" class="form-control" name="password" 
                                   placeholder="请输入密码" required>
                        </div>

                        <button type="submit" class="btn btn-login btn-primary w-100 text-white mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>登录后台
                        </button>
                    </form>

                    <div class="text-center">
                        <a href="/login" class="text-decoration-none text-muted">
                            <i class="bi bi-arrow-left me-1"></i>返回用户登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
